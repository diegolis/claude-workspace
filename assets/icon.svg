<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#16213e"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="128" height="128" rx="20" fill="url(#bg)"/>
  <!-- Grid of 6 panes (3 columns x 2 rows) -->
  <!-- Row 1 -->
  <rect x="12" y="12" width="30" height="46" rx="6" fill="#d97757" opacity="0.9"/>
  <rect x="49" y="12" width="30" height="46" rx="6" fill="#d97757" opacity="0.7"/>
  <rect x="86" y="12" width="30" height="46" rx="6" fill="#d97757" opacity="0.5"/>
  <!-- Row 2 -->
  <rect x="12" y="70" width="30" height="46" rx="6" fill="#d97757" opacity="0.5"/>
  <rect x="49" y="70" width="30" height="46" rx="6" fill="#d97757" opacity="0.7"/>
  <rect x="86" y="70" width="30" height="46" rx="6" fill="#d97757" opacity="0.9"/>
  <!-- Terminal cursors -->
  <rect x="17" y="22" width="12" height="2.5" rx="1" fill="#fff" opacity="0.9"/>
  <rect x="54" y="22" width="8" height="2.5" rx="1" fill="#fff" opacity="0.7"/>
  <rect x="91" y="22" width="10" height="2.5" rx="1" fill="#fff" opacity="0.5"/>
  <rect x="17" y="80" width="10" height="2.5" rx="1" fill="#fff" opacity="0.5"/>
  <rect x="54" y="80" width="12" height="2.5" rx="1" fill="#fff" opacity="0.7"/>
  <rect x="91" y="80" width="8" height="2.5" rx="1" fill="#fff" opacity="0.9"/>
</svg>
